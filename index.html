<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Redirect Short Links</title>
  <script>
    // Preia ultima parte din URL (ex: "7rb89ir3n")
    const path = window.location.pathname.split('/').pop();

    // Dacă există ceva după /vclipgo/
    if(path) {
      // Construiește linkul short.icu
      const redirectUrl = 'https://short.icu/' + path;
      window.location.href = redirectUrl; // redirecționează
    } else {
      // Dacă e doar homepage, rămâi pe index
      document.body.innerHTML = '<h2>Bine ai venit pe pagina VClipGo!</h2>';
    }
  </script>
</head>
<body>
  <p>Dacă nu se redirecționează automat, <a id="redirect-link" href="/">click aici</a>.</p>
</body>
</html>
